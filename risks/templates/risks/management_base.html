<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Bank Risk System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --page:#03070b; --panel:rgba(19,24,35,.58); --panel2:rgba(25,31,44,.46); --line:rgba(188,207,238,.17); --line-strong:rgba(188,207,238,.28); --text:#edf4ff; --muted:#92a0b4; --blue:#4f8cff; --green:#18a66a; --danger:#ef4056; --gold:#f5b72e; --glass-shadow:0 24px 70px rgba(0,0,0,.34); }
        * { box-sizing: border-box; }
        html { min-height:100%; }
        body { margin:0; min-height:100vh; background:radial-gradient(circle at 12% 8%, rgba(79,140,255,.14), transparent 30%), radial-gradient(circle at 78% 18%, rgba(24,166,106,.10), transparent 28%), linear-gradient(180deg,#03070b 0%,#050a0f 48%,#030608 100%); background-attachment:fixed; color:var(--text); font-family:"Segoe UI", Arial, sans-serif; }
        a { color: inherit; text-decoration: none; }
        .shell { width:min(1320px, calc(100% - 32px)); margin:0 auto; padding:18px 0 42px; }
        .topbar { border:1px solid var(--line-strong); background:linear-gradient(135deg, rgba(19,23,34,.72), rgba(11,15,22,.56)); display:grid; grid-template-columns:auto minmax(0,1fr); align-items:center; gap:16px; padding:10px 14px; margin-bottom:22px; box-shadow:var(--glass-shadow); backdrop-filter:blur(18px) saturate(130%); -webkit-backdrop-filter:blur(18px) saturate(130%); }
        .brand { display:flex; align-items:center; gap:12px; }
        .brand-mark { width:40px; height:40px; border-radius:50%; display:grid; place-items:center; background:linear-gradient(135deg,var(--blue),var(--green)); font-weight:900; }
        .brand-title { font-weight:900; line-height:1.1; }
        .brand-subtitle { color:var(--muted); font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; }
        .nav-actions { display:flex; gap:7px; flex-wrap:nowrap; justify-content:flex-end; overflow-x:auto; min-width:0; scrollbar-width:thin; }
        .btnx, button { border:1px solid var(--line); background:rgba(255,255,255,.045); color:var(--text); padding:8px 10px; font-weight:850; cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,.04); white-space:nowrap; }
        .btnx:hover, button:hover { border-color:var(--blue); background:rgba(79,140,255,.18); color:#fff; }
        .btn-primaryx { background:var(--blue); border-color:var(--blue); color:#fff; }
        .btn-dangerx { background:rgba(239,64,86,.12); border-color:rgba(239,64,86,.5); color:#ff9ba7; }
        .hero, .panel { border:1px solid var(--line-strong); background:linear-gradient(135deg, rgba(34,41,58,.58), rgba(10,15,22,.42)), rgba(12,17,25,.34); box-shadow:var(--glass-shadow); backdrop-filter:blur(18px) saturate(128%); -webkit-backdrop-filter:blur(18px) saturate(128%); position:relative; overflow:hidden; }
        .hero::before, .panel::before { content:""; position:absolute; inset:0; pointer-events:none; background:linear-gradient(135deg, rgba(255,255,255,.075), transparent 36%); opacity:.72; }
        .hero > *, .panel > * { position:relative; z-index:1; }
        .hero { padding:28px; margin-bottom:22px; }
        .panel { padding:22px; margin-bottom:22px; }
        .hero-panel, .premium-panel { border:1px solid var(--line-strong); background:linear-gradient(135deg, rgba(34,41,58,.58), rgba(10,15,22,.42)), rgba(12,17,25,.34); box-shadow:var(--glass-shadow); backdrop-filter:blur(18px) saturate(128%); -webkit-backdrop-filter:blur(18px) saturate(128%); padding:28px; margin-bottom:22px; position:relative; overflow:hidden; }
        .hero-panel::before, .premium-panel::before { content:""; position:absolute; inset:0; pointer-events:none; background:linear-gradient(135deg, rgba(255,255,255,.075), transparent 36%); }
        .hero-panel > *, .premium-panel > * { position:relative; z-index:1; }
        .eyebrow { color:var(--blue); letter-spacing:.3em; text-transform:uppercase; font-size:.74rem; font-weight:900; }
        .section-eyebrow { color:var(--blue); letter-spacing:.3em; text-transform:uppercase; font-size:.74rem; font-weight:900; }
        h1 { font-size:clamp(2rem,4vw,3.2rem); line-height:1.05; font-weight:950; margin:10px 0; }
        h2 { font-size:1.25rem; font-weight:900; margin:8px 0 12px; }
        .page-title, .section-title { color:var(--text); font-weight:950; }
        .muted, .small-muted, .page-subtitle, .helper-text { color:var(--muted); }
        .grid-2 { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; }
        .grid-3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; }
        .grid-4 { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; }
        .stat { border:1px solid var(--line); background:rgba(255,255,255,.045); padding:16px; box-shadow:inset 0 1px 0 rgba(255,255,255,.04); }
        .stat span { color:var(--muted); font-size:.78rem; letter-spacing:.08em; text-transform:uppercase; font-weight:900; }
        .stat strong { display:block; font-size:1.7rem; margin-top:6px; }
        .form-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; }
        .form-field.full { grid-column:1/-1; }
        label { color:var(--muted); display:block; margin-bottom:7px; font-weight:850; }
        input, select, textarea, .premium-form-control, .premium-select { width:100%; background:rgba(7,12,19,.54); border:1px solid var(--line); color:var(--text); padding:11px 12px; }
        select option { background:#0c111a; color:var(--text); }
        textarea { resize:vertical; }
        table { width:100%; border-collapse:collapse; }
        th, td { border-bottom:1px solid var(--line); padding:11px; vertical-align:top; }
        th { color:var(--muted); text-transform:uppercase; letter-spacing:.08em; font-size:.75rem; }
        .badge-soft { display:inline-flex; border:1px solid var(--line); background:rgba(255,255,255,.045); padding:6px 8px; font-size:.78rem; font-weight:850; }
        .bar-row { display:grid; grid-template-columns:135px 1fr 44px; gap:10px; align-items:center; margin:10px 0; }
        .bar-track { height:10px; border:1px solid var(--line); background:rgba(3,7,12,.66); overflow:hidden; }
        .bar-fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--green)); }
        .actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .hero-actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        .premium-button, .button-ghost { border:1px solid var(--line); background:rgba(255,255,255,.045); color:var(--text); padding:10px 13px; font-weight:900; cursor:pointer; display:inline-flex; align-items:center; }
        .premium-button { background:var(--blue); border-color:var(--blue); color:#fff; }
        .button-ghost:hover { border-color:var(--blue); background:rgba(79,140,255,.18); color:#fff; }
        .alertx { border:1px solid rgba(79,140,255,.4); background:rgba(79,140,255,.1); padding:12px; margin-bottom:14px; }
        .card, .modal-content, .dropdown-menu { background:var(--panel) !important; color:var(--text) !important; border:1px solid var(--line-strong) !important; backdrop-filter:blur(18px) saturate(128%); -webkit-backdrop-filter:blur(18px) saturate(128%); }
        .table { --bs-table-bg:transparent; --bs-table-color:var(--text); --bs-table-border-color:var(--line); color:var(--text); }
        .text-muted { color:var(--muted) !important; }
        .theme-toggle { width:38px; height:38px; display:inline-grid; place-items:center; padding:0; }
        body.theme-light { --page:#caecf8; --panel:rgba(245,253,255,.68); --panel2:rgba(237,249,254,.56); --line:rgba(9,66,88,.16); --line-strong:rgba(9,66,88,.24); --text:#071a26; --muted:#4f6674; --blue:#1f56b7; --green:#087b5b; --danger:#e12d48; --gold:#c98a00; --glass-shadow:0 24px 70px rgba(18,91,117,.18); background:radial-gradient(circle at 12% 10%, rgba(255,255,255,.78), transparent 28%), radial-gradient(circle at 72% 18%, rgba(98,190,216,.32), transparent 30%), linear-gradient(180deg,#d7f3fb 0%,#bee5f2 48%,#d8f1f8 100%); background-attachment:fixed; color:var(--text); }
        body.theme-light .topbar,
        body.theme-light .hero,
        body.theme-light .panel,
        body.theme-light .hero-panel,
        body.theme-light .premium-panel,
        body.theme-light .card,
        body.theme-light .modal-content,
        body.theme-light .dropdown-menu { background:linear-gradient(135deg, rgba(255,255,255,.70), rgba(232,248,253,.46)), rgba(238,250,255,.42) !important; border-color:var(--line-strong) !important; box-shadow:var(--glass-shadow); color:var(--text) !important; }
        body.theme-light .hero::before,
        body.theme-light .panel::before,
        body.theme-light .hero-panel::before,
        body.theme-light .premium-panel::before { background:linear-gradient(135deg, rgba(255,255,255,.72), transparent 42%); opacity:.9; }
        body.theme-light .brand-title,
        body.theme-light h1,
        body.theme-light h2,
        body.theme-light h3,
        body.theme-light .page-title,
        body.theme-light .section-title,
        body.theme-light .fw-bold,
        body.theme-light strong { color:var(--text); }
        body.theme-light .brand-mark { background:#a9c6f0; color:#082344; }
        body.theme-light .btnx,
        body.theme-light button,
        body.theme-light .premium-button,
        body.theme-light .button-ghost,
        body.theme-light .stat,
        body.theme-light .badge-soft,
        body.theme-light .alertx { background:rgba(255,255,255,.46); border-color:var(--line); color:var(--text); }
        body.theme-light .btnx:hover,
        body.theme-light button:hover,
        body.theme-light .button-ghost:hover { color:#0b2c66; background:rgba(31,86,183,.14); border-color:rgba(31,86,183,.24); }
        body.theme-light .btn-primaryx,
        body.theme-light .premium-button { background:var(--blue); border-color:var(--blue); color:#fff; }
        body.theme-light input,
        body.theme-light select,
        body.theme-light textarea,
        body.theme-light .premium-form-control,
        body.theme-light .premium-select { background:rgba(255,255,255,.58); color:var(--text); border-color:var(--line); }
        body.theme-light select option { background:#e7f7fc; color:var(--text); }
        body.theme-light .bar-track { background:rgba(255,255,255,.55); border-color:var(--line); }
        body.theme-light .bar-fill { background:linear-gradient(90deg,#1f56b7,#0d8c82); }
        body.theme-light .table { --bs-table-bg:transparent; --bs-table-color:var(--text); --bs-table-border-color:var(--line); color:var(--text); }
        body.theme-light th,
        body.theme-light td { color:var(--text); border-color:var(--line); }
        body.theme-light .muted,
        body.theme-light .small-muted,
        body.theme-light .page-subtitle,
        body.theme-light .helper-text,
        body.theme-light .text-muted,
        body.theme-light label,
        body.theme-light .brand-subtitle { color:var(--muted) !important; }
        @media (max-width:900px) { .topbar{grid-template-columns:1fr;} .nav-actions{justify-content:flex-start;} .grid-2,.grid-3,.grid-4,.form-grid{grid-template-columns:1fr;} }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <script>
        (function () {
            if ((localStorage.getItem("bankRiskTheme") || "light") === "light") {
                document.body.classList.add("theme-light");
            }
        })();
    </script>
    <main class="shell">
        <header class="topbar">
            <div class="brand"><div class="brand-mark">BR</div><div><div class="brand-title">Bank Risk System</div><div class="brand-subtitle">{% block module_name %}Management Workspace{% endblock %}</div></div></div>
            <nav class="nav-actions">
                <a class="btnx" href="{% url 'dashboard' %}">Dashboard</a>
                <a class="btnx" href="{% url 'risk-create' %}">Add Risk</a>
                <a class="btnx" href="{% url 'risk-calendar' %}">Calendar</a>
                <a class="btnx" href="{% url 'audit-log' %}">Audit Log</a>
                <button type="button" class="btnx theme-toggle" id="themeToggle" title="Switch theme" aria-label="Switch theme"><i class="fas fa-sun"></i></button>
            </nav>
        </header>
        {% for message in messages %}<div class="alertx">{{ message }}</div>{% endfor %}
        {% block content %}{% endblock %}
    </main>
    <script>
        (function () {
            const key = "bankRiskTheme";
            const body = document.body;
            const toggle = document.getElementById("themeToggle");
            const icon = toggle ? toggle.querySelector("i") : null;
            function applyTheme(theme) {
                body.classList.toggle("theme-light", theme === "light");
                if (icon) icon.className = theme === "light" ? "fas fa-moon" : "fas fa-sun";
                if (toggle) {
                    toggle.title = theme === "light" ? "Switch to dark mode" : "Switch to light mode";
                    toggle.setAttribute("aria-label", toggle.title);
                }
            }
            applyTheme(localStorage.getItem(key) || "light");
            if (toggle) {
                toggle.addEventListener("click", function () {
                    const nextTheme = body.classList.contains("theme-light") ? "dark" : "light";
                    localStorage.setItem(key, nextTheme);
                    applyTheme(nextTheme);
                });
            }
        })();
    </script>
</body>
</html>
