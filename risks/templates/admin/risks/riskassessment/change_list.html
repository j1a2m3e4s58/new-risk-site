{% extends "admin/change_list.html" %}

{% block content %}
<div style="margin-bottom: 20px; padding: 20px; background: linear-gradient(135deg, rgba(34,41,58,.70), rgba(10,15,22,.55)); border: 1px solid rgba(188,207,238,.24); border-radius: 0; box-shadow: 0 24px 70px rgba(0,0,0,.34); color: #edf4ff !important;">
    
    <h3 style="margin-top: 0; margin-bottom: 15px; color: #4f8cff !important; font-weight: bold; border-bottom: 1px solid rgba(188,207,238,.24); padding-bottom: 10px;">
        Risk Matrix Legend
    </h3>
    
    <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
        
        <div style="display: flex; align-items: center;">
            <span style="display: inline-block; width: 24px; height: 24px; background-color: #d32f2f; margin-right: 10px; border-radius: 4px; border: 1px solid #ccc;"></span>
            <strong style="color: #edf4ff; font-size: 16px;">Critical (Very High)</strong>
        </div>

        <div style="display: flex; align-items: center;">
            <span style="display: inline-block; width: 24px; height: 24px; background-color: #f57c00; margin-right: 10px; border-radius: 4px; border: 1px solid #ccc;"></span>
            <strong style="color: #edf4ff; font-size: 16px;">Severe (High)</strong>
        </div>

        <div style="display: flex; align-items: center;">
            <span style="display: inline-block; width: 24px; height: 24px; background-color: #fbc02d; margin-right: 10px; border-radius: 4px; border: 1px solid #ccc;"></span>
            <strong style="color: #edf4ff; font-size: 16px;">Moderate</strong>
        </div>

        <div style="display: flex; align-items: center;">
            <span style="display: inline-block; width: 24px; height: 24px; background-color: #388e3c; margin-right: 10px; border-radius: 4px; border: 1px solid #ccc;"></span>
            <strong style="color: #edf4ff; font-size: 16px;">Sustainable (Low)</strong>
        </div>

    </div>
</div>

{{ block.super }}
{% endblock %}
