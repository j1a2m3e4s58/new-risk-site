services:
  - type: web
    name: new-risk-site
    env: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn bank_risk_system.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: SECRET_KEY
        generateValue: true
